# MSA 설정 - Board Service
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 60000
  refresh-token-expiration-ms: 1209600000

solapi:
  enabled: true
  api-key: ${SOLAPI_API_KEY}
  api-secret: ${SOLAPI_API_SECRET}
  from-phone: ${SOLAPI_FROM_PHONE}
  base-url: "https://api.solapi.com"

spring:
  application:
    name: board-service

  profiles:
    active: local

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  datasource-myspringbootuser:
    driver-class-name: oracle.jdbc.OracleDriver
    jdbcUrl: ${DB_URL:jdbc:oracle:thin:@127.0.0.1:1521:xe}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  messages:
    basename: messages.validation
    encoding: UTF-8

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

mybatis:
  mapper-locations: classpath:mybatis/mapper/**/*.xml

logging:
  level:
    '[com.spring.app]': debug

server:
  port: 8002
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-part-count: 30

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
  instance:
    prefer-ip-address: true

file:
  upload-dir: file_upload
  photoupload-dir: file_photoupload
  emailattachfile-dir: file_emailattachfile
  images-dir: file_images

portone:
  impCode: ${PORTONE_IMP_CODE}
  apiKey: ${PORTONE_API_KEY}
  apiSecret: ${PORTONE_API_SECRET}

app:
  login-url: /user-service/member/login